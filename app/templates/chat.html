
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>{{ organisation.name }} Support</title>

    <link
        rel="stylesheet"
        href="/static/css/chat.css"
    >
</head>

<body
    class="chat-body"
    style="
        --primary: {{ organisation.primary_colour }};
        --secondary: {{ organisation.secondary_colour }};
    "
>
    <main class="chat-page">
        <header class="chat-header">
            <div class="brand-section">
                <div class="brand-logo">
                    {{ organisation.name[0] }}
                </div>

                <div>
                    <h1>{{ organisation.name }}</h1>

                    <p>
                        Privacy-Aware Support Assistant
                    </p>
                </div>
            </div>

            <div class="header-actions">
                <span class="status-indicator">
                    <span class="status-dot"></span>
                    Online
                </span>

                <button
                    id="reset-button"
                    class="secondary-button"
                    type="button"
                >
                    New conversation
                </button>
            </div>
        </header>

        <section class="privacy-banner">
            <strong>Privacy notice:</strong>
            Do not enter passwords, payment-card details or highly
            sensitive personal information.
        </section>

        <section
            id="chat-messages"
            class="chat-messages"
            aria-live="polite"
        >
        </section>

        <div
            id="typing-indicator"
            class="typing-indicator hidden"
        >
            <span></span>
            <span></span>
            <span></span>
        </div>

        <form
            id="chat-form"
            class="chat-form"
        >
            <label
                for="message-input"
                class="visually-hidden"
            >
                Enter your question
            </label>

            <textarea
                id="message-input"
                name="message"
                maxlength="1000"
                rows="1"
                placeholder="Ask a question..."
                required
            ></textarea>

            <button
                id="send-button"
                type="submit"
                class="send-button"
            >
                Send
            </button>
        </form>

        <footer class="chat-footer">
            Answers are limited to organisation-approved information.
            Complex cases can be passed to human support.
        </footer>
    </main>

    <script>
        const organisationId = "{{ organisation.id }}";
        const welcomeMessage = {{ organisation.welcome_message | tojson }};

        const messagesContainer =
            document.getElementById("chat-messages");

        const chatForm =
            document.getElementById("chat-form");

        const messageInput =
            document.getElementById("message-input");

        const sendButton =
            document.getElementById("send-button");

        const resetButton =
            document.getElementById("reset-button");

        const typingIndicator =
            document.getElementById("typing-indicator");

        const storageKey =
            `privacy-chat-session-${organisationId}`;

        function createSessionId() {
            if (
                window.crypto &&
                typeof window.crypto.randomUUID === "function"
            ) {
                return window.crypto
                    .randomUUID()
                    .replaceAll("-", "_");
            }

            return (
                "session_" +
                Date.now() +
                "_" +
                Math.random()
                    .toString(36)
                    .slice(2)
            );
        }

        function getSessionId() {
            let sessionId =
                localStorage.getItem(storageKey);

            if (!sessionId) {
                sessionId = createSessionId();

                localStorage.setItem(
                    storageKey,
                    sessionId
                );
            }

            return sessionId;
        }

        function addMessage(
            text,
            sender,
            source = null,
            status = null
        ) {
            const wrapper =
                document.createElement("div");

            wrapper.className =
                `message-row ${sender}`;

            const messageCard =
                document.createElement("div");

            messageCard.className =
                `message-card ${sender}`;

            const messageText =
                document.createElement("p");

            messageText.textContent = text;

            messageCard.appendChild(
                messageText
            );

            if (source) {
                const sourceElement =
                    document.createElement("small");

                sourceElement.className =
                    "source-reference";

                sourceElement.textContent =
                    `Source: ${source}`;

                messageCard.appendChild(
                    sourceElement
                );
            }

            if (
                status === "blocked" ||
                status === "authentication_required"
            ) {
                messageCard.classList.add(
                    "warning-message"
                );
            }

            if (status === "escalated") {
                messageCard.classList.add(
                    "escalation-message"
                );
            }

            wrapper.appendChild(
                messageCard
            );

            messagesContainer.appendChild(
                wrapper
            );

            messagesContainer.scrollTop =
                messagesContainer.scrollHeight;
        }

        function setLoading(isLoading) {
            sendButton.disabled = isLoading;
            messageInput.disabled = isLoading;

            typingIndicator.classList.toggle(
                "hidden",
                !isLoading
            );

            if (!isLoading) {
                messageInput.focus();
            }
        }

        async function sendMessage(message) {
            const sessionId = getSessionId();

            const response = await fetch(
                `/api/org/${organisationId}/chat`,
                {
                    method: "POST",
                    headers: {
                        "Content-Type":
                            "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: message
                    })
                }
            );

            if (!response.ok) {
                const errorData =
                    await response.json();

                throw new Error(
                    errorData.detail ||
                    "The request failed."
                );
            }

            return await response.json();
        }

        chatForm.addEventListener(
            "submit",
            async function(event) {
                event.preventDefault();

                const message =
                    messageInput.value.trim();

                if (!message) {
                    return;
                }

                addMessage(
                    message,
                    "user"
                );

                messageInput.value = "";
                setLoading(true);

                try {
                    const result =
                        await sendMessage(message);

                    addMessage(
                        result.reply,
                        "assistant",
                        result.source,
                        result.status
                    );
                }

                catch (error) {
                    addMessage(
                        "The assistant could not process your request. " +
                        error.message,
                        "assistant",
                        null,
                        "blocked"
                    );
                }

                finally {
                    setLoading(false);
                }
            }
        );

        messageInput.addEventListener(
            "keydown",
            function(event) {
                if (
                    event.key === "Enter" &&
                    !event.shiftKey
                ) {
                    event.preventDefault();
                    chatForm.requestSubmit();
                }
            }
        );

        resetButton.addEventListener(
            "click",
            async function() {
                const oldSessionId =
                    getSessionId();

                try {
                    await fetch(
                        `/api/org/${organisationId}/reset`,
                        {
                            method: "POST",
                            headers: {
                                "Content-Type":
                                    "application/json"
                            },
                            body: JSON.stringify({
                                session_id:
                                    oldSessionId
                            })
                        }
                    );
                }

                catch (error) {
                    console.error(
                        "Server reset failed:",
                        error
                    );
                }

                localStorage.removeItem(
                    storageKey
                );

                getSessionId();

                messagesContainer.innerHTML = "";

                addMessage(
                    welcomeMessage,
                    "assistant"
                );

                messageInput.focus();
            }
        );

        addMessage(
            welcomeMessage,
            "assistant"
        );

        messageInput.focus();
    </script>
</body>
</html>
